<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub链接转换工具</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f6f8fa;
      margin: 0;
      padding: 20px;
      color: #24292f;
    }
    .container {
      max-width: 650px;
      margin: 40px auto;
      background-color: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(140, 149, 159, 0.15);
      border: 1px solid #d0d7de;
    }
    h1 {
      margin-top: 0;
      color: #0969da;
      text-align: center;
      font-weight: 600;
      border-bottom: 1px solid #d8dee4;
      padding-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
      color: #57606a;
    }
    input, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      line-height: 1.5;
      padding: 12px 16px;
      border-radius: 6px;
      border: 1px solid #d0d7de;
      transition: border-color 0.2s ease-in-out;
    }
    input {
      margin-bottom: 16px;
      background-color: #fafbfc;
    }
    input:focus {
      outline: none;
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
    }
    button {
      background-color: #2da44e;
      color: white;
      border: none;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s ease-in-out;
    }
    button:hover {
      background-color: #2c974b;
    }
    .result {
      background-color: #f6f8fa;
      padding: 20px;
      border-radius: 6px;
      margin-top: 25px;
      border: 1px solid #d0d7de;
      display: none;
    }
    .result h3 {
      margin-top: 0;
      font-size: 16px;
      color: #24292f;
    }
    #convertedLink {
      display: block;
      padding: 12px 16px;
      background-color: #ffffff;
      border-radius: 4px;
      border: 1px solid #d0d7de;
      color: #0969da;
      text-decoration: none;
      word-break: break-all;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 14px;
    }
    #convertedLink:hover {
      text-decoration: underline;
    }
    .example {
      margin-top: 10px;
      font-size: 13px;
      color: #57606a;
    }
    .error-message {
      color: #cf222e;
      background-color: #ffebe9;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid rgba(207, 34, 46, 0.2);
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GitHub链接转换工具</h1>
    <label for="githubUrl">输入GitHub仓库链接</label>
    <input type="url" id="githubUrl"
           placeholder="例如：https://github.com/username/repository-name"
           spellcheck="false">
    <button id="convertBtn">立即转换</button>
    <div class="example">
      支持的链接格式：https://github.com/作者名/仓库名
    </div>

    <div class="error-message" id="errorMessage">
      请输入一个有效的GitHub仓库链接。
    </div>

    <div class="result" id="result">
      <h3>转换后的链接：</h3>
      <a id="convertedLink" target="_blank" rel="noopener noreferrer"></a>
    </div>
  </div>

  <script>
    const inputField = document.getElementById('githubUrl');
    const convertButton = document.getElementById('convertBtn');
    const resultDiv = document.getElementById('result');
    const convertedLinkElem = document.getElementById('convertedLink');
    const errorMessageDiv = document.getElementById('errorMessage');

    // GitHub链接正则表达式
    const githubUrlPattern = /^https:\/\/(github\.com)\/([^\/]+)\/([^\/]+)(\/.*)?$/;

    function convertUrl() {
      const originalUrl = inputField.value.trim();
      const match = originalUrl.match(githubUrlPattern);

      // 隐藏之前的结果和错误信息
      resultDiv.style.display = 'none';
      errorMessageDiv.style.display = 'none';

      if (!match) {
        // 输入无效，显示错误信息
        errorMessageDiv.style.display = 'block';
        inputField.focus();
        return;
      }

      // 解析链接各部分
      const [, originalDomain, owner, repo, path = ''] = match;
      // 转换域名（将点号替换为连字符并添加后缀）
      const convertedDomain = originalDomain.replace(/\./g, '-') + '-gh.zarijaden.cc.cd';
      // 构建新链接
      const newUrl = `https://${convertedDomain}/${owner}/${repo}${path}`;

      // 更新结果区域的链接
      convertedLinkElem.href = newUrl;
      convertedLinkElem.textContent = newUrl;

      // 显示结果
      resultDiv.style.display = 'block';
    }

    // 为按钮添加点击事件
    convertButton.addEventListener('click', convertUrl);

    // 为输入框添加回车键支持
    inputField.addEventListener('keyup', function(event) {
      if (event.key === 'Enter') {
        convertUrl();
      }
    });
  </script>
</body>
</html>
