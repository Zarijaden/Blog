<!DOCTYPE html>
<html>
<head>
  <title>GitHub 链接转换工具</title>
  <style>
    .container { max-width: 600px; margin: 50px auto; padding: 20px; }
    input, button { width: 100%; padding: 10px; margin: 10px 0; }
    .result { background: #f5f5f5; padding: 15px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>GitHub 链接转换工具</h1>
    <input type="url" id="githubUrl" 
           placeholder="输入 GitHub 链接，如：https://github.com/Zarijaden/blog">
    <button onclick="convertUrl()">转换链接</button>
    
    <div class="result" id="result" style="display:none;">
      <h3>转换结果：</h3>
      <a id="convertedLink" target="_blank"></a>
    </div>
  </div>

  <script>
    function convertUrl() {
      const originalUrl = document.getElementById('githubUrl').value;
      const githubRegex = /^https:\/\/(github\.com)\/([^\/]+)\/([^\/]+)(\/.*)?$/;
      const match = originalUrl.match(githubRegex);
      
      if (!match) {
        alert('请输入有效的 GitHub 仓库链接');
        return;
      }
      
      const [, domain, owner, repo, path = ''] = match;
      const newDomain = domain.replace(/\./g, '-') + '-gh.zarijaden.cc.cd';
      const convertedUrl = `https://${newDomain}/${owner}/${repo}${path}`;
      
      const resultDiv = document.getElementById('result');
      const linkElem = document.getElementById('convertedLink');
      
      linkElem.href = convertedUrl;
      linkElem.textContent = convertedUrl;
      resultDiv.style.display = 'block';
    }
  </script>
</body>
</html>
