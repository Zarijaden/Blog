name: Deploy Hexo site to Pages

on:
  # 当代码推送到 main 分支时触发
  push:
    branches: ["main"]
  # 允许从 Actions 标签页手动触发此工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# 并发控制：同一时间只允许一个部署运行，但不取消正在进行的部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 如果您的 Hexo 主题是作为 Git 子模块引入的，请启用此项
          fetch-depth: 0         # 获取完整的历史记录，有助于 hexo 的某些插件正常工作

      - name: Setup Node.js
        # 参考 Jekyll 示例中的版本锁定方式
        uses: actions/setup-node@v4
        with:
          node-version: '20'     # 指定 Node.js 版本，建议与本地开发环境一致
          cache: 'npm'           # 缓存 npm 依赖，显著加快后续构建速度

      - name: Install Dependencies
        run: npm install             # 使用 `npm ci` 而非 `npm install`，确保依赖版本与 lockfile 完全一致，构建更可靠

      - name: Build with Hexo
        # Hexo 默认构建命令，输出目录为 ./public
        run: npm install hexo-deployer-git --save
      - name: Push
        run: |
            git config user.name Zarijaden
            git config user.email zarijaden@gmail.com
            git add .
            git commit -m "update"
            git push
